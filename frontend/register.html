<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş & Kayıt</title>
</head>
<body>

<h2>Giriş Yap</h2>
<input type="text" id="email" placeholder="email">
<input type="password" id="password" placeholder="şifre">
<button onclick="login()">Giriş</button>

<h2>Kayıt Ol</h2>
<input type="text" id="uyeemail" placeholder="email">
<input type="text" id="uyename" placeholder="isim">
<input type="password" id="uyepassword" placeholder="şifre">
<button onclick="register()">Kayıt</button>

<script>
// Ortak headers tanımlaması (API'nin JSON beklediğini belirtir)
const headers = { "Content-Type": "application/json" };

async function login() {
    // DOĞRU YOL: ../backend/register.php
    const res = await fetch("../backend/register.php?action=login", {
        method: "POST",
        headers: headers, // Bunu eklemelisin
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    });
    const data = await res.json();
    alert(data.status + ": " + (data.message || ""));
}

async function register() {
    // HATA DÜZELTİLDİ: "api.php" yerine "../backend/register.php" yapıldı
    const res = await fetch("../backend/register.php?action=register", {
        method: "POST",
        headers: headers, // Bunu eklemelisin
        body: JSON.stringify({
            email: document.getElementById('uyeemail').value,
            name: document.getElementById('uyename').value,
            password: document.getElementById('uyepassword').value
        })
    });
    const data = await res.json();
    alert(data.status + ": " + (data.message || ""));
}
</script>

</body>
</html>
