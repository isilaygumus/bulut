<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Giriş & Kayıt</title>
</head>
<body>

<h2>Giriş Yap</h2>
<input type="text" id="email" placeholder="email">
<input type="password" id="password" placeholder="şifre">
<button onclick="login()">Giriş</button>

<h2>Kayıt Ol</h2>
<input type="text" id="uyeemail" placeholder="email">
<input type="text" id="uyename" placeholder="isim">
<input type="password" id="uyepassword" placeholder="şifre">
<button onclick="register()">Kayıt</button>

<script>
async function login() {
    const res = await fetch("register.php?action=login", {
        method: "POST",
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });
    const data = await res.json();
    alert(data.status);
}

async function register() {
    const res = await fetch("api.php?action=register", {
        method: "POST",
        body: JSON.stringify({
            email: uyeemail.value,
            name: uyename.value,
            password: uyepassword.value
        })
    });
    const data = await res.json();
    alert(data.status);
}
</script>

</body>
</html>
